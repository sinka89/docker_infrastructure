services:
  postgresql:
    image: postgis/postgis:latest
    container_name: postgresql
    hostname: postgresql.host
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST_AUTH_METHOD=${POSTGRES_HOST_AUTH_METHOD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    hostname: pgadmin.host
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE}
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  artemismq:
    image: "apache/activemq-artemis"
    container_name: artemismq
    hostname: artemismq.host
    restart: unless-stopped
    environment:
      - JAVA_OPTS="-Xms512M -Xmx1024m"
      - ARTEMIS_USER=${ARTEMIS_USER}
      - ARTEMIS_PASSWORD=${ARTEMIS_PASSWORD}
      - ANONYMOUS_LOGIN=${ANONYMOUS_LOGIN}
    volumes:
      - artemis_instance:/var/lib/artemis-instance
    ports:
      - "127.0.0.1:61616:61616"
      - "127.0.0.1:61613:61613"
      - "127.0.0.1:8161:8161"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
volumes:
  postgis_data:
    driver: local
  pgadmin:
    driver: local
  artemis_instance:
    driver: local
